name: Swap, Deposit, Withdraw, Uniswapv3 Pools Bugs (Everything except Cross Trade)
description: Public test rewards are not available for swap, deposit, withdraw, Uniswapv3 bugs -> separate rewards may be available. 
title: "[Other bugs]: "
labels: []
assignees:
  - suahnkim
body:
  - type: markdown
    attributes:
      value: |
        Important: There are no rewards for reporting bugs for swap, deposit, withdraw, UniswapV3 pools. If you are interested in participating in public test, make reports about Cross Trade. 
  - type: dropdown
    id: feature
    attributes:
      label: Can you specify where the bug exists?
      multiple: true
      options:
        - swap
        - deposit
        - withdraw
        - Uniswapv3 pools (add, remove, collect)
        - Cross Trade -> go back and use other form
        - Others
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen? 
      placeholder: Tell us what you see! 
      value: "Describe the bug and its behavior! You can also upload the image and code links (public-test/crosstrade branch)"
    validations:
      required: true
  - type: dropdown
    id: browsers
    attributes:
      label: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: textarea
    id: additional-output
    attributes:
      label: Upload any screenshots to aid with explaining the bug.
      description: Upload screenshots
      placeholder:  Tell us what you see!
      value: "Upload image here"
    validations:
      required: true